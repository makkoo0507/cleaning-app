services:
  app:
    build:
      context: ./next
      dockerfile: ../docker/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./next:/app                    # ソースコード・node_modules ともホストからバインドマウント
    env_file:
      - .env.local
    environment:
      - WATCHPACK_POLLING=true         # Mac でのホットリロード対応
      - SUPABASE_URL=http://host.docker.internal:54321  # コンテナ→ホストの Supabase
